<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>您未获授权，无法查看此网页。</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#0b1220;color:#eaf2ff;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:rgba(8,15,28,.85);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px 28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:24px}
.brand-name{font-size:26px;font-weight:700;background:linear-gradient(90deg,#23c4ed,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.status-text{text-align:center;color:#8ea2c9;font-size:14px;margin-bottom:20px;min-height:20px}
.spinner-wrap{text-align:center;margin-bottom:20px}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#34d399;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lines{list-style:none;margin-bottom:16px}
.lines li{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-size:14px;transition:all .2s}
.lines li.ok{border-color:rgba(52,211,153,.25);cursor:pointer}
.lines li.ok:hover{background:rgba(52,211,153,.1)}
.lines li.fail{opacity:.45}
.lines li.best{border-color:#34d399;background:rgba(52,211,153,.12)}
.line-name{font-weight:600}
.line-status{font-size:13px;color:#8ea2c9}
.line-status.checking::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.15);border-top-color:#23c4ed;border-radius:50%;animation:spin .8s linear infinite;margin-left:6px;vertical-align:middle}
.line-status.ok{color:#34d399}
.line-status.fail{color:#ff6b6b}
.actions{text-align:center;margin-top:16px}
.btn{border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:linear-gradient(90deg,#23c4ed,#34d399);color:#052033}
.btn-secondary{background:#1f2f4d;color:#dce8ff}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.fallback-icon{font-size:48px;margin-bottom:16px;text-align:center}
.fallback-title{font-size:20px;font-weight:700;margin-bottom:8px;text-align:center}
.fallback-desc{color:#8ea2c9;margin-bottom:20px;font-size:14px;line-height:1.6;text-align:center}
.contact-links{margin-top:16px;text-align:center}
.contact-links a{color:#23c4ed;text-decoration:none;font-size:14px;display:inline-block;margin:4px 8px}
.contact-links a:hover{text-decoration:underline}
.hide{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand"><div class="brand-name" id="brandName">您未获授权，无法查看此网页。</div></div>
    <div id="mainContent">
      <div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>
      <div class="status-text" id="statusText">正在连接...</div>
      <ul class="lines" id="lineList"></ul>
      <div class="actions hide" id="mainActions">
        <button class="btn btn-secondary" id="cancelBtn">取消自动跳转</button>
      </div>
    </div>
    <div id="fallbackContent" class="hide">
      <div class="fallback-icon">⚠️</div>
      <div class="fallback-title">线路检测失败</div>
      <div class="fallback-desc">所有线路均不可用，请稍后重试或通过以下方式获取最新地址。</div>
      <div class="actions">
        <button class="btn btn-primary" onclick="location.reload()">重新检测</button>
      </div>
      <div class="contact-links" id="contactLinks"></div>
    </div>
  </div>
</div>
<script>
(function(){
  /* ========== 配置 ========== */
  var CONFIG_URLS = ['domains.json'];
  var TIMEOUT = 2000;
  var RACE_GRACE = 300;
  var CACHE_KEY = 'kvi_jump_cache';
  var CACHE_TTL = 300000;
  var COUNTDOWN = 3;
  var MAX_RETRIES = 3;
  var DEFAULT_CONFIG = {
    wildcard:{enabled:true,baseDomain:'a.hui-od.top',candidateCount:6,labelLength:3},
    probeAssets:['/static/index/img/down_left.png','/static/mobile/imgn/coinwin_ico.png','/static/mobile/imgn/recharg_2x.png'],
    probeAssetThreshold:2,
    domains:[],
    siteName:'您未获授权，无法查看此网页。',
    contact:{}
  };

  /* ========== DOM ========== */
  var $=function(id){return document.getElementById(id)};

  /* ========== 工具函数 ========== */
  function cloneData(d){return JSON.parse(JSON.stringify(d))}

  function normalizeConfig(cfg){
    var r=cloneData(DEFAULT_CONFIG),s=cfg||{};
    if(s.wildcard){
      r.wildcard.enabled=s.wildcard.enabled!==false;
      r.wildcard.baseDomain=s.wildcard.baseDomain||r.wildcard.baseDomain;
      r.wildcard.candidateCount=parseInt(s.wildcard.candidateCount,10)||r.wildcard.candidateCount;
      r.wildcard.labelLength=parseInt(s.wildcard.labelLength,10)||r.wildcard.labelLength;
    }
    if(s.domains&&s.domains.length)r.domains=s.domains.slice();
    if(s.probeAssets&&s.probeAssets.length)r.probeAssets=s.probeAssets.slice();
    if(s.probeAssetThreshold)r.probeAssetThreshold=parseInt(s.probeAssetThreshold,10)||r.probeAssetThreshold;
    if(s.siteName)r.siteName=s.siteName;
    if(s.contact)r.contact=s.contact;
    return r;
  }

  function randomLabel(len){
    var c='abcdefghijklmnopqrstuvwxyz0123456789',v='';
    for(var i=0;i<len;i++)v+=c.charAt(Math.floor(Math.random()*c.length));
    return v;
  }

  /* ========== 智能缓存 ========== */
  function getCache(){
    try{
      var raw=localStorage.getItem(CACHE_KEY);
      if(!raw)return null;
      var c=JSON.parse(raw);
      if(c&&c.url&&c.ts&&(Date.now()-c.ts<CACHE_TTL))return c;
    }catch(e){}
    return null;
  }
  function setCache(url,latency){
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({url:url,latency:latency||0,ts:Date.now()}));}catch(e){}
  }

  /* ========== DNS 预解析 ========== */
  function addDnsPrefetch(host){
    var link=document.createElement('link');
    link.rel='dns-prefetch';
    link.href='//'+host;
    document.head.appendChild(link);
  }

  /* ========== 域名生成 ========== */
  function buildWildcardDomains(cfg){
    var wc=cfg&&cfg.wildcard?cfg.wildcard:{};
    var base=wc.baseDomain||'';
    var count=parseInt(wc.candidateCount,10)||6;
    var len=parseInt(wc.labelLength,10)||3;
    var domains=[],used={},max=count*8,att=0;
    if(!base)return domains;
    while(domains.length<count&&att<max){
      att++;
      var label=randomLabel(len);
      var url='https://'+label+'.'+base;
      if(used[url])continue;
      used[url]=true;
      domains.push({url:url,name:'线路'+(domains.length+1),provider:'wildcard'});
    }
    return domains;
  }

  function resolveDomains(cfg){
    if(cfg&&cfg.domains&&cfg.domains.length)return cfg.domains;
    if(cfg&&cfg.wildcard&&cfg.wildcard.enabled)return buildWildcardDomains(cfg);
    return[];
  }

  /* ========== 探测 ========== */
  function probeAsset(url,timeout,cb){
    var img=new Image(),done=false;
    var timer=setTimeout(function(){if(done)return;done=true;img.src='';cb(false)},timeout);
    function fin(ok){if(done)return;done=true;clearTimeout(timer);cb(ok)}
    img.onload=function(){fin(true)};
    img.onerror=function(){fin(false)};
    img.src=url;
  }

  function checkDomain(domain,cfg,cb){
    var start=Date.now();
    var base=domain.url.replace(/\/+$/,'');
    var assets=(cfg&&cfg.probeAssets&&cfg.probeAssets.length)?cfg.probeAssets:DEFAULT_CONFIG.probeAssets;
    var threshold=parseInt(cfg&&cfg.probeAssetThreshold,10)||DEFAULT_CONFIG.probeAssetThreshold;
    var state={done:false,ok:0,total:0,timer:null};
    state.timer=setTimeout(function(){finish(false,0)},TIMEOUT);
    function finish(ok,latency){
      if(state.done)return;
      state.done=true;
      clearTimeout(state.timer);
      cb(ok,latency||0);
    }
    function evaluate(){
      if(state.done)return;
      if(state.ok>=threshold){finish(true,Date.now()-start);return}
      if(state.total===assets.length&&state.ok<threshold)finish(false,0);
    }
    assets.forEach(function(path){
      probeAsset(base+path+'?t='+Date.now(),TIMEOUT-500,function(ok){
        state.total++;if(ok)state.ok++;
        evaluate();
      });
    });
  }

  /* ========== UI 操作 ========== */
  function setStatus(t){$('statusText').textContent=t}
  function showSpinner(v){$('spinnerWrap').style.display=v?'':'none'}

  function renderLines(domains){
    var ul=$('lineList');ul.innerHTML='';
    domains.forEach(function(d,i){
      var li=document.createElement('li');
      li.id='line-'+i;
      li.innerHTML='<span class="line-name">'+d.name+'</span><span class="line-status checking" id="ls-'+i+'">检测中</span>';
      ul.appendChild(li);
    });
  }

  function updateLine(i,ok,latency){
    var li=$('line-'+i),s=$('ls-'+i);
    if(!li||!s)return;
    s.className='line-status '+(ok?'ok':'fail');
    s.textContent=ok?(latency+'ms'):'超时';
    li.className=ok?'ok':'fail';
  }

  function markBest(i){
    var li=$('line-'+i);
    if(li)li.className='ok best';
  }

  function bindLineClick(i,url){
    var li=$('line-'+i);
    if(li)li.onclick=function(){jumpTo(url)};
  }

  function showFallback(cfg){
    $('mainContent').className='hide';
    $('fallbackContent').className='';
    var ct=(cfg&&cfg.contact)||{};
    var html='';
    if(ct.telegram)html+='<a href="'+ct.telegram+'" target="_blank" rel="noopener">📱 Telegram</a>';
    if(ct.customerService)html+='<a href="'+ct.customerService+'" target="_blank" rel="noopener">💬 在线客服</a>';
    if(!html)html='<span style="color:#8ea2c9;font-size:13px">请联系您的推荐人获取最新地址</span>';
    $('contactLinks').innerHTML=html;
  }

  /* ========== 跳转 ========== */
  function jumpTo(url){
    setCache(url,0);
    setStatus('正在获取访问凭证...');
    // 先获取 gate token，带参数跳转到目标站
    var xhr=new XMLHttpRequest();
    xhr.open('GET','/api/gate-token',true);
    xhr.timeout=2000;
    xhr.onload=function(){
      var gateToken='';
      try{var d=JSON.parse(xhr.responseText);gateToken=d.token||''}catch(e){}
      var sep=url.indexOf('?')>=0?'&':'?';
      window.location.replace(url+sep+'_gate='+encodeURIComponent(gateToken));
    };
    xhr.onerror=function(){window.location.replace(url)};
    xhr.ontimeout=xhr.onerror;
    xhr.send();
  }

  /* ========== 倒计时 ========== */
  function startCountdown(results,cfg){
    var best=results[0];
    var remaining=COUNTDOWN;
    var cancelled=false;
    showSpinner(false);
    setStatus(remaining+' 秒后跳转到最快线路...');
    $('mainActions').className='actions';
    markBest(best.index);
    results.forEach(function(r){bindLineClick(r.index,r.url)});

    $('cancelBtn').onclick=function(){
      cancelled=true;
      clearInterval(iv);
      setStatus('已取消，请手动选择线路');
      $('mainActions').className='actions hide';
    };

    var iv=setInterval(function(){
      if(cancelled)return;
      remaining--;
      if(remaining<=0){
        clearInterval(iv);
        jumpTo(best.url);
      }else{
        setStatus(remaining+' 秒后跳转到最快线路...');
      }
    },1000);
  }

  /* ========== 全量探测 ========== */
  function startProbe(cfg,retry){
    retry=retry||0;
    var domains=resolveDomains(cfg);
    if(!domains.length){showFallback(cfg);return}
    showSpinner(true);
    setStatus('正在检测最快线路...');
    renderLines(domains);

    var results=[],done=0,finished=false,grace=null;

    function doFinish(){
      if(finished)return;finished=true;
      if(grace)clearTimeout(grace);
      if(results.length){
        results.sort(function(a,b){return a.latency-b.latency});
        startCountdown(results,cfg);
      }
    }

    domains.forEach(function(d,i){
      checkDomain(d,cfg,function(ok,latency){
        done++;
        updateLine(i,ok,latency);
        if(ok){
          results.push({url:d.url,name:d.name,latency:latency,index:i});
          bindLineClick(i,d.url);
          if(!grace)grace=setTimeout(doFinish,RACE_GRACE);
        }
        if(done===domains.length){
          if(results.length){doFinish()}
          else if(retry<MAX_RETRIES){
            setStatus('重试中 ('+(retry+1)+'/'+MAX_RETRIES+')...');
            setTimeout(function(){startProbe(cfg,retry+1)},800);
          }else{showFallback(cfg)}
        }
      });
    });
  }

  /* ========== 多源配置加载 ========== */
  function loadConfig(cb){
    function tryUrl(i){
      if(i>=CONFIG_URLS.length){cb(normalizeConfig(null));return}
      var xhr=new XMLHttpRequest();
      xhr.open('GET',CONFIG_URLS[i]+'?t='+Date.now(),true);
      xhr.timeout=3000;
      xhr.onload=function(){
        if(xhr.status===200){try{cb(normalizeConfig(JSON.parse(xhr.responseText)));return}catch(e){}}
        tryUrl(i+1);
      };
      xhr.onerror=function(){tryUrl(i+1)};
      xhr.ontimeout=xhr.onerror;
      xhr.send();
    }
    tryUrl(0);
  }

  /* ========== Token 验证 ========== */
  function getUrlToken(){
    var m=location.search.match(/[?&]token=([^&]+)/);
    return m?decodeURIComponent(m[1]):'';
  }

  function verifyToken(token,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('GET','/api/verify-token?token='+encodeURIComponent(token),true);
    xhr.timeout=3000;
    xhr.onload=function(){
      if(xhr.status===200){try{var d=JSON.parse(xhr.responseText);cb(d&&d.ok)}catch(e){cb(false)}}
      else cb(false);
    };
    xhr.onerror=function(){cb(false)};
    xhr.ontimeout=xhr.onerror;
    xhr.send();
  }

  function showDenied(){
    $('mainContent').className='hide';
    $('fallbackContent').className='';
    document.querySelector('.fallback-icon').textContent='🔒';
    document.querySelector('.fallback-title').textContent='访问受限';
    document.querySelector('.fallback-desc').textContent='302 请求遭到拒绝  ';
    $('contactLinks').innerHTML='<span style="color:#8ea2c9;font-size:13px"></span>';
  }

  /* ========== 启动 ========== */
  function init(){
    var token=getUrlToken();
    if(!token){showDenied();return}
    setStatus('正在验证访问权限...');
    verifyToken(token,function(ok){
      if(!ok){showDenied();return}
      // token有效,清掉URL中的token参数(防止泄露)
      if(window.history&&history.replaceState){
        history.replaceState(null,'',location.pathname);
      }
      loadConfig(function(cfg){
        if(cfg.siteName)$('brandName').textContent=cfg.siteName;
        if(cfg.wildcard&&cfg.wildcard.baseDomain)addDnsPrefetch(cfg.wildcard.baseDomain);
        var cached=getCache();
        if(cached){
          setStatus('快速验证上次线路...');
          checkDomain({url:cached.url,name:'缓存'},cfg,function(ok2){
            if(ok2)jumpTo(cached.url);
            else startProbe(cfg);
          });
        }else{
          startProbe(cfg);
        }
      });
    });
  }

  init();
})();
</script>
</body>
</html>
